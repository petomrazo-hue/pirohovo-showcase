[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[redirects]]
  from = "http://pirohovo.eu/*"
  to   = "https://pirohovo.eu/:splat"
  status = 301
  force  = true

[[redirects]]
  from = "http://www.pirohovo.eu/*"
  to   = "https://pirohovo.eu/:splat"
  status = 301
  force  = true

[[redirects]]
  from = "https://www.pirohovo.eu/*"
  to   = "https://pirohovo.eu/:splat"
  status = 301
  force  = true

[[redirects]]
  from = "/order"
  to = "/order.html"
  status = 301

[[redirects]]
  from = "/menu"
  to = "/menu.html"
  status = 301

[[redirects]]
  from = "/alergeny"
  to = "/alergeny.html"
  status = 301
